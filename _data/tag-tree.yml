# =============================================================
# 태그 트리 — 3D 우주 씬(home)의 태그 계층 구조 정의
# -------------------------------------------------------------
# - children 항목은 문자열(잎 태그) 또는 {name, children} 객체.
# - 여기에 등록되지 않은 태그는 hero-space.js 가 자동으로
#   최상위(루트) 별로 표시한다. (예: 기술정리)
# - name 은 prompts/태그사전.md 의 태그명과 정확히 일치해야
#   글 별이 해당 태그에 매달린다.
# =============================================================
- name: 개발
  children:
    - name: 백엔드
      children: [데이터베이스, 인프라]
    - name: 프론트엔드
      children: [JS게임]
    - 알고리즘
    - 공학지식
- name: 지식·삶
  children: [생각정리, 생산성, 커리어, 회고, 독서]
